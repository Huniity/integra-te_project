
services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

  backend:
    build:
      context: .
      dockerfile: ops/backend/Dockerfile.dev
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
    env_file: .env
    volumes:
      - ./srcs/backend:/app
      - ./scripts:/scripts
      - django_logs:/app/logs
      - media_files:/app/staticfiles/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: ops/frontend/Dockerfile.dev
    volumes:
      - ./srcs/frontend:/app
      - /app/node_modules
      - frontend_logs:/app/logs
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  django_logs:
  frontend_logs:
  media_files: